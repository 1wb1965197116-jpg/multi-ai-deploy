<!DOCTYPE html>
<html>
<head>
<title>SaaS Empire</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<h1>🚀 SaaS Empire Dashboard</h1>

<h3>👤 User</h3>
<input id="user" placeholder="username">
<input id="pass" placeholder="password">
<button class="btn-purple" onclick="register()">Register</button>
<button class="btn-ai" onclick="login()">Login</button>

<h3>💳 Monetization</h3>
<button class="btn-green" onclick="checkout()">Start Subscription</button>

<h3>📊 Dashboard</h3>
<button onclick="loadDashboard()">Load Dashboard</button>
<div id="dashboard"></div>

<h3>🤖 SaaS Builder</h3>
<input id="saasPrompt" placeholder="Build SaaS idea...">
<button class="btn-purple" onclick="buildSaaS()">Generate SaaS</button>

<h3>🧠 AI Code Builder</h3>
<textarea id="fileContent"></textarea>
<button class="btn-ai" onclick="aiBuild()">AI Build</button>

<div id="dropZone">📂 Drag Script Here</div>

<h3>🚀 Deploy</h3>
<button class="btn-github" onclick="deploy('github')">GitHub</button>
<button class="btn-render" onclick="deploy('render')">Render</button>
<button class="btn-vercel" onclick="deploy('vercel')">Vercel</button>
<button class="btn-supabase" onclick="deploy('supabase')">Supabase</button>

<button class="mainDeploy" onclick="checkBeforeDeploy()">Deploy Now</button>

<h3>💬 Chatbot</h3>
<div id="chatBox"></div>
<input id="chatInput">
<button onclick="sendChat()">Send</button>

<div id="output"></div>

<script src="app.js"></script>
</body>
</html>
